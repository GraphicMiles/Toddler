name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android:
    name: Build ForgeAI Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK, NDK, and CMake
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "ndk;25.2.9519653"

      - name: Verify toolchain
        shell: bash
        run: |
          java -version
          adb version
          cmake --version
          test -f third_party/llama.cpp/include/llama.h
          test -f android/gradle/wrapper/gradle-wrapper.properties

      - name: Install JavaScript dependencies
        shell: bash
        run: npm ci

      - name: Run unit tests
        shell: bash
        run: npm test

      - name: Build web application
        shell: bash
        run: npm run build

      - name: Sync Capacitor Android project
        shell: bash
        run: npx cap sync android

      - name: Build debug APK
        shell: bash
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK output
        shell: bash
        run: |
          test -f android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: forgeai-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
