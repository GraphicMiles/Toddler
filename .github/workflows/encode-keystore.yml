name: Encode Temporary Keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  encode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Convert keystore to Base64
        run: |
          test -f temporary/toddler-release.keystore
          base64 -w 0 temporary/toddler-release.keystore > toddler-release.keystore.base64

      - name: Upload Base64 file
        uses: actions/upload-artifact@v4
        with:
          name: toddler-keystore-base64
          path: toddler-release.keystore.base64
          retention-days: 1
