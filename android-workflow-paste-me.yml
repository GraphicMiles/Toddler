name: Build Android APK

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Toddler Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x gradlew

      - name: Restore permanent Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/toddler-release.keystore
          test -s android/keystore/toddler-release.keystore

      - name: Configure permanent Android signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle")
          text = path.read_text()

          # signingConfigs lives as a sibling of buildTypes inside android {}.
          # Use 4-space indentation matching the existing buildTypes block.
          signing_block = (
              "    signingConfigs {\n"
              "        toddler {\n"
              '            storeFile file("../keystore/toddler-release.keystore")\n'
              '            storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")\n'
              '            keyAlias System.getenv("ANDROID_KEY_ALIAS")\n'
              '            keyPassword System.getenv("ANDROID_KEY_PASSWORD")\n'
              "        }\n"
              "    }\n"
          )

          if "signingConfigs {" not in text:
              text = text.replace("    buildTypes {", signing_block + "\n    buildTypes {", 1)

          # Replace the whole buildTypes { ... } block (with proper brace
          # matching so nested release {} and proguardFiles('{...}') strings
          # don't break the parse). Idempotent: running twice produces the
          # same file.
          new_build_types = (
              "    buildTypes {\n"
              "        debug {\n"
              "            signingConfig signingConfigs.toddler\n"
              "        }\n"
              "        release {\n"
              "            signingConfig signingConfigs.toddler\n"
              "            minifyEnabled false\n"
              "            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n"
              "        }\n"
              "    }"
          )
          marker = "    buildTypes {"
          start = text.find(marker)
          if start < 0:
              raise SystemExit("Could not find buildTypes block to patch")
          depth = 0
          i = start
          in_str = None
          while i < len(text):
              ch = text[i]
              if in_str:
                  if ch == "\\":
                      i += 2; continue
                  if ch == in_str:
                      in_str = None
              else:
                  if ch in ("'", '"'):
                      in_str = ch
                  elif ch == "{":
                      depth += 1
                  elif ch == "}":
                      depth -= 1
                      if depth == 0:
                          end = i + 1
                          break
              i += 1
          else:
              raise SystemExit("Unbalanced braces while patching buildTypes")
          # Only replace if the existing block differs (idempotent).
          existing = text[start:end]
          desired = new_build_types
          if existing.rstrip() != desired.rstrip():
              text = text[:start] + desired + text[end:]

          path.write_text(text)
          PY

      - name: Show permanent signing fingerprints
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          keytool -list -v \
            -keystore android/keystore/toddler-release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            | grep -E "Alias name:|SHA1:|SHA256:"

      - name: Build web application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
        run: npm run build

      - name: Sync web app into Capacitor Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          test -f android/app/build/outputs/apk/release/app-release.apk
          ls -lh android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: toddler-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
