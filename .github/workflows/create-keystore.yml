name: Create Permanent Android Keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate permanent keystore
        run: |
          keytool -genkeypair -v \
            -keystore toddler-release.keystore \
            -storepass toddler-keystore-password \
            -alias toddler \
            -keypass toddler-key-password \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Toddler,O=GraphicMiles,C=NG"

      - name: Print keystore fingerprints
        run: |
          keytool -list -v \
            -keystore toddler-release.keystore \
            -storepass toddler-keystore-password \
            | grep -E "Alias name:|SHA1:|SHA256:"

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: toddler-permanent-keystore
          path: toddler-release.keystore
          retention-days: 1
